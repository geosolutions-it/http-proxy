# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-maven

name: CI

on:
  push:
    branches:
    - master
    - '[0-9]+.[0-9]+*'
  pull_request:
    branches:
    - master
    - '[0-9]+.[0-9]+*'

jobs:
  # Run build and test
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Build with Maven
      run: mvn -B clean install
  ## Only on push event, publish on geosolutions maven repo
  publish:
    runs-on: ubuntu-latest
    if:  ${{ github.event_name == 'push' && github.repository == 'geosolutions-it/http-proxy' }}
    needs: build
    concurrency: ci-${{ github.ref }}
    steps:
      - uses: actions/checkout@v3
      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HTTP_PROXY_MAVEN_SSH_KEY }}
      - name: Trust Maven Host
        run: ssh-keyscan -H maven.geo-solutions.it >> ~/.ssh/known_hosts
      - name: Set up Maven Central Repository
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          server-id: geosolutions
          server-username: MAVEN_USERNAME
      - name: Publish package
        run: |
          mvn -B clean install deploy
        env:
          MAVEN_USERNAME: ${{ secrets.HTTP_PROXY_MAVEN_USERNAME }}